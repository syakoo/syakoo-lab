name: CI

on:
  - pull_request

env:
  NEXT_PUBLIC_GOOGLE_ANALYTICS_ID: "dummy-ga-id"

jobs:
  semver-label:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require exactly one semver:* label
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          if [[ "$AUTHOR" == "renovate[bot]" ]]; then
            echo "renovate[bot]: semver label optional (defaults to patch on merge)."
            exit 0
          fi
          IFS=',' read -r -a label_arr <<< "$LABELS"
          count=0
          for label in "${label_arr[@]}"; do
            case "$label" in
              semver:major|semver:minor|semver:patch) count=$((count + 1)) ;;
            esac
          done
          if [[ "$count" -eq 1 ]]; then
            echo "OK: semver label present."
            exit 0
          fi
          echo "::error::Add exactly one of: semver:major, semver:minor, semver:patch (got ${count})."
          exit 1

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js and Pnpm
        uses: ./.github/actions/setup-node-and-pnpm

      - name: Setup Safe Chain
        uses: ./.github/actions/setup-safe-chain

      - name: Verify safe-chain protection
        run: pnpm safe-chain-verify

      - name: Install dependencies with safe-chain
        run: pnpm install --frozen-lockfile
        env:
          SAFE_CHAIN_LOGGING: verbose

  lint:
    needs: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js and Pnpm
        uses: ./.github/actions/setup-node-and-pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run Lint
        run: pnpm lint

  type-check:
    needs: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js and Pnpm
        uses: ./.github/actions/setup-node-and-pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run type check
        run: pnpm type-check

  unit-test:
    needs: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js and Pnpm
        uses: ./.github/actions/setup-node-and-pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run unit test
        run: pnpm test

  build-check:
    needs: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js and Pnpm
        uses: ./.github/actions/setup-node-and-pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run Build
        run: pnpm build

  storybook-test:
    needs: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js and Pnpm
        uses: ./.github/actions/setup-node-and-pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright
        run: pnpm exec playwright install chromium --with-deps

      - name: Build Storybook
        run: pnpm storybook:build

      - name: Run Storybook tests
        run: pnpm storybook:test:ci
